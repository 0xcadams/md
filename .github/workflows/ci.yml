name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  actions-security:
    name: Audit GitHub Actions
    permissions:
      contents: read # Required to check out the repository and run online audits.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          annotations: true
          persona: auditor
          version: "1.27.0"

  test:
    name: Test (${{ matrix.os }})
    permissions:
      contents: read # Required to check out the repository.
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build standalone executable
        run: bun run binary

  container:
    name: Container
    permissions:
      contents: read # Required to check out the repository.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build image
        run: docker build --build-arg VERSION=ci -t md:ci .

      - name: Smoke test read-only image
        shell: bash
        run: |
          docker run --rm -d \
            --name md-ci \
            --read-only \
            --cap-drop=ALL \
            --security-opt=no-new-privileges \
            -p 127.0.0.1:8080:8080 \
            --mount type=bind,src="${GITHUB_WORKSPACE}/demo-files",dst=/data,readonly \
            md:ci
          trap 'docker rm -f md-ci >/dev/null 2>&1 || true' EXIT
          curl --fail --retry 10 --retry-delay 1 http://127.0.0.1:8080/__md/health
          curl --fail http://127.0.0.1:8080/ | grep -q 'Directory contents'
