name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build standalone executable
        run: bun run binary

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build image
        run: docker build --build-arg VERSION=ci -t md:ci .

      - name: Smoke test read-only image
        shell: bash
        run: |
          docker run --rm -d \
            --name md-ci \
            --read-only \
            --cap-drop=ALL \
            --security-opt=no-new-privileges \
            -p 127.0.0.1:8080:8080 \
            --mount type=bind,src="${GITHUB_WORKSPACE}/demo-files",dst=/data,readonly \
            md:ci
          trap 'docker rm -f md-ci >/dev/null 2>&1 || true' EXIT
          curl --fail --retry 10 --retry-delay 1 http://127.0.0.1:8080/__md/health
          curl --fail http://127.0.0.1:8080/ | grep -q 'Directory contents'
