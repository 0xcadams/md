name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Match tag to package version
        shell: bash
        run: |
          EXPECTED="v$(node -p 'require("./package.json").version')"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${EXPECTED}" >&2
            exit 1
          fi

  binaries:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64-baseline
            runner: ubuntu-latest
            os: linux
            arch: amd64
            executable: md
          - target: bun-linux-arm64
            runner: ubuntu-latest
            os: linux
            arch: arm64
            executable: md
          - target: bun-darwin-x64
            runner: macos-latest
            os: darwin
            arch: amd64
            executable: md
          - target: bun-darwin-arm64
            runner: macos-latest
            os: darwin
            arch: arm64
            executable: md
          - target: bun-windows-x64-baseline
            runner: ubuntu-latest
            os: windows
            arch: amd64
            executable: md.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build executable
        env:
          MD_BUILD_VERSION: ${{ github.ref_name }}
          MD_OUTFILE: dist/${{ matrix.executable }}
          MD_TARGET: ${{ matrix.target }}
        run: bun run binary

      - name: Ad-hoc sign macOS executable
        if: matrix.os == 'darwin'
        run: |
          codesign --force --sign - dist/md
          codesign --verify --deep --strict dist/md

      - name: Package executable
        shell: bash
        run: |
          ARCHIVE="md_${GITHUB_REF_NAME}_${{ matrix.os }}_${{ matrix.arch }}"
          mkdir "${ARCHIVE}"
          cp "dist/${{ matrix.executable }}" README.md LICENSE "${ARCHIVE}/"
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip -r "${ARCHIVE}.zip" "${ARCHIVE}"
          else
            tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: md_${{ matrix.os }}_${{ matrix.arch }}
          path: |
            md_*.tar.gz
            md_*.zip

  image:
    needs: [validate, binaries]
    permissions:
      contents: read
      packages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          build-args: VERSION=${{ github.ref_name }}
          context: .
          labels: ${{ steps.metadata.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          push: true
          sbom: true
          tags: ${{ steps.metadata.outputs.tags }}

  release:
    needs: [binaries, image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum md_* > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            artifacts/md_*.tar.gz
            artifacts/md_*.zip
            artifacts/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
