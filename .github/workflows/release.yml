name: Release

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: true

permissions: {}

jobs:
  validate:
    name: Validate release
    outputs:
      prerelease: ${{ steps.release.outputs.prerelease }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    permissions:
      contents: read # Required to check out the repository and inspect existing tags.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - id: release
        name: Validate package version
        shell: bash
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Releases must be dispatched from main" >&2
            exit 1
          fi

          VERSION="$(node -p 'require("./package.json").version')"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "package.json version ${VERSION} is not valid semver" >&2
            exit 1
          fi

          TAG="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists" >&2
            exit 1
          fi

          PRERELEASE=false
          if [[ "${VERSION}" == *-* ]]; then
            PRERELEASE=true
          fi

          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

  binaries:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    needs: validate
    permissions:
      contents: read # Required to check out the repository.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64-baseline
            runner: ubuntu-latest
            os: linux
            arch: amd64
            executable: md
          - target: bun-linux-arm64
            runner: ubuntu-latest
            os: linux
            arch: arm64
            executable: md
          - target: bun-darwin-x64
            runner: macos-latest
            os: darwin
            arch: amd64
            executable: md
          - target: bun-darwin-arm64
            runner: macos-latest
            os: darwin
            arch: arm64
            executable: md
          - target: bun-windows-x64-baseline
            runner: ubuntu-latest
            os: windows
            arch: amd64
            executable: md.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build executable
        env:
          MD_BUILD_VERSION: ${{ needs.validate.outputs.tag }}
          MD_OUTFILE: dist/${{ matrix.executable }}
          MD_TARGET: ${{ matrix.target }}
        run: bun run binary

      - name: Ad-hoc sign macOS executable
        if: matrix.os == 'darwin'
        run: |
          codesign --force --sign - dist/md
          codesign --verify --deep --strict dist/md

      - name: Package executable
        env:
          RELEASE_ARCH: ${{ matrix.arch }}
          RELEASE_EXECUTABLE: ${{ matrix.executable }}
          RELEASE_OS: ${{ matrix.os }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        shell: bash
        run: |
          ARCHIVE="md_${RELEASE_TAG}_${RELEASE_OS}_${RELEASE_ARCH}"
          mkdir "${ARCHIVE}"
          cp "dist/${RELEASE_EXECUTABLE}" README.md LICENSE "${ARCHIVE}/"
          if [ "${RELEASE_OS}" = "windows" ]; then
            zip -r "${ARCHIVE}.zip" "${ARCHIVE}"
          else
            tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: md_${{ matrix.os }}_${{ matrix.arch }}
          path: |
            md_*.tar.gz
            md_*.zip

  image:
    name: Publish container image
    needs: [validate, binaries]
    permissions:
      contents: read # Required to check out the repository.
      packages: write # Required to publish the image to GHCR.
      id-token: write # Required to attach build provenance.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.validate.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.validate.outputs.tag }}
            type=raw,value=latest,enable=${{ needs.validate.outputs.prerelease == 'false' }}

      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          build-args: VERSION=${{ needs.validate.outputs.tag }}
          context: .
          labels: ${{ steps.metadata.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          push: true
          sbom: true
          tags: ${{ steps.metadata.outputs.tags }}

      - name: Summarize README update
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          {
            echo '### Manual README update'
            echo
            echo 'After testing the release, replace the Docker command in `README.md` with:'
            echo
            echo '```bash'
            echo 'docker run --rm \'
            echo '  --read-only \'
            echo '  --cap-drop=ALL \'
            echo '  --security-opt=no-new-privileges \'
            echo '  -p 8080:8080 \'
            echo '  --mount type=bind,src="$PWD",dst=/data,readonly \'
            echo "  ghcr.io/${GITHUB_REPOSITORY}@${IMAGE_DIGEST}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

  release:
    name: Publish GitHub release
    needs: [validate, binaries, image]
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create the tag and GitHub release.
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: md_*
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum md_* > SHA256SUMS

      - name: Create tag and publish GitHub release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_PRERELEASE: ${{ needs.validate.outputs.prerelease }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        shell: bash
        run: |
          OPTIONS=(--generate-notes --target "${GITHUB_SHA}" --title "${RELEASE_TAG}")
          if [ "${RELEASE_PRERELEASE}" = "true" ]; then
            OPTIONS+=(--prerelease)
          fi
          gh release create "${RELEASE_TAG}" \
            artifacts/md_*.tar.gz \
            artifacts/md_*.zip \
            artifacts/SHA256SUMS \
            "${OPTIONS[@]}"

  homebrew:
    name: Publish Homebrew formula
    if: needs.validate.outputs.prerelease == 'false'
    needs: [validate, release]
    environment: homebrew
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Download release checksums
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          mkdir artifacts
          gh release download "${RELEASE_TAG}" --pattern SHA256SUMS --dir artifacts

      - name: Generate formula
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          checksum() {
            awk -v name="$1" '$2 == name { print $1 }' artifacts/SHA256SUMS
          }

          DARWIN_ARM64="$(checksum "md_${RELEASE_TAG}_darwin_arm64.tar.gz")"
          DARWIN_AMD64="$(checksum "md_${RELEASE_TAG}_darwin_amd64.tar.gz")"
          LINUX_ARM64="$(checksum "md_${RELEASE_TAG}_linux_arm64.tar.gz")"
          LINUX_AMD64="$(checksum "md_${RELEASE_TAG}_linux_amd64.tar.gz")"

          for value in "${DARWIN_ARM64}" "${DARWIN_AMD64}" "${LINUX_ARM64}" "${LINUX_AMD64}"; do
            if [[ ! "${value}" =~ ^[0-9a-f]{64}$ ]]; then
              echo "Missing release checksum" >&2
              exit 1
            fi
          done

          mkdir Formula
          cat > Formula/md.rb <<EOF
          class Md < Formula
            desc "Minimal server for viewing Markdown and code"
            homepage "https://md.cadams.io"
            version "${VERSION}"
            license "Unlicense"

            on_macos do
              on_arm do
                url "https://github.com/0xcadams/md/releases/download/${RELEASE_TAG}/md_${RELEASE_TAG}_darwin_arm64.tar.gz"
                sha256 "${DARWIN_ARM64}"
              end

              on_intel do
                url "https://github.com/0xcadams/md/releases/download/${RELEASE_TAG}/md_${RELEASE_TAG}_darwin_amd64.tar.gz"
                sha256 "${DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/0xcadams/md/releases/download/${RELEASE_TAG}/md_${RELEASE_TAG}_linux_arm64.tar.gz"
                sha256 "${LINUX_ARM64}"
              end

              on_intel do
                url "https://github.com/0xcadams/md/releases/download/${RELEASE_TAG}/md_${RELEASE_TAG}_linux_amd64.tar.gz"
                sha256 "${LINUX_AMD64}"
              end
            end

            def install
              bin.install "md"
            end

            test do
              assert_equal "md v#{version}", shell_output("#{bin}/md --version").strip
            end
          end
          EOF

          ruby -c Formula/md.rb

      - name: Publish formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          CONTENT="$(base64 -w 0 Formula/md.rb)"
          SHA="$(gh api repos/0xcadams/homebrew-tap/contents/Formula/md.rb --jq .sha 2>/dev/null || true)"

          if [ -n "${SHA}" ]; then
            gh api repos/0xcadams/homebrew-tap/contents/Formula/md.rb \
              --method PUT \
              -f message="md ${VERSION}" \
              -f content="${CONTENT}" \
              -f sha="${SHA}"
          else
            gh api repos/0xcadams/homebrew-tap/contents/Formula/md.rb \
              --method PUT \
              -f message="md ${VERSION}" \
              -f content="${CONTENT}"
          fi
